<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./translations.js"></script>
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;0,900;1,500;1,600;1,700;1,800;1,900&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html { scroll-behavior: smooth; }
  body { margin: 0; background: #080808; }
  @keyframes lineUp { from { transform: translateY(112%); } to { transform: translateY(0); } }
  @keyframes softUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</helmet>

<div style="position:relative; width:100%; min-height:100vh; min-height:100dvh; background:#080808; font-family:'Archivo',sans-serif; overflow-x:hidden;">

  <video ref="{{ videoRef }}" autoPlay="{{ true }}" muted="{{ true }}" loop="{{ true }}" playsInline="{{ true }}" webkit-playsinline="true" poster="https://images.pexels.com/videos/2286306/free-video-2286306.jpg?auto=compress&cs=tinysrgb&w=1600" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0;">
    <source src="https://videos.pexels.com/video-files/2286306/2286306-hd_1280_720_24fps.mp4" type="video/mp4">
    <source src="https://videos.pexels.com/video-files/2286306/2286306-hd_1920_1080_24fps.mp4" type="video/mp4">
    <source src="https://videos.pexels.com/video-files/2286306/2286306-sd_960_540_24fps.mp4" type="video/mp4">
  </video>
  <div style="{{ heroOverlayStyle }}">

  <audio ref="{{ audioRef }}" loop="{{ true }}" preload="auto">
    <source src="https://actions.google.com/sounds/v1/water/water_rushing_stereo_series.ogg" type="audio/ogg">
  </audio>

  <header style="{{ headerStyle }}">
    <a href="#" style="{{ brandStyle }}">Kayak Rafting Peru</a>
    <div style="{{ headerRightStyle }}">
      <div style="{{ langSwitchStyle }}">
        <button onClick="{{ setEN }}" aria-label="English" style="{{ enBtnStyle }}">EN</button>
        <span style="color:#f4f1ec; opacity:0.4; font-size:11px;">/</span>
        <button onClick="{{ setES }}" aria-label="Español" style="{{ esBtnStyle }}">ES</button>
      </div>
      <button onClick="{{ openMenu }}" style="{{ menuBtnStyle }}">
        <span>{{ menuLabel }}</span>
        <span style="font-size:20px; font-weight:300; line-height:1;">+</span>
      </button>
    </div>
  </header>

  <section data-screen-label="Hero" style="{{ sectionStyle }}">
    <h1 style="margin:0; max-width:1100px; font-family:'Playfair Display',serif; color:#f7f4ef; font-weight:800; line-height:0.9; font-size:clamp(34px, min(10.5vw, 15vh), 168px); letter-spacing:-0.01em;">
      <span style="display:block; overflow:hidden;"><span style="display:block; animation:lineUp 1s cubic-bezier(0.16,1,0.3,1) both; animation-delay:0.12s;">{{ heroLine1 }}</span></span>
      <span style="display:block; overflow:hidden;"><span style="display:block; font-style:italic; font-weight:600; animation:lineUp 1s cubic-bezier(0.16,1,0.3,1) both; animation-delay:0.24s;">{{ heroLine2 }}</span></span>
      <span style="display:block; overflow:hidden;"><span style="display:block; animation:lineUp 1s cubic-bezier(0.16,1,0.3,1) both; animation-delay:0.36s;">{{ heroLine3 }}</span></span>
      <span style="display:block; overflow:hidden;"><span style="display:block; font-style:italic; font-weight:600; animation:lineUp 1s cubic-bezier(0.16,1,0.3,1) both; animation-delay:0.48s;">{{ heroLine4 }}</span></span>
    </h1>

    <div style="{{ bottomRowStyle }}">
      <p style="{{ paraStyle }}">{{ introText }}</p>
      <div style="{{ actionGroupStyle }}">
        <button onClick="{{ toggleSound }}" aria-label="{{ soundLabel }}" title="{{ soundLabel }}" style="{{ soundBtnStyle }}" style-hover="border-color:rgba(247,244,239,0.7); color:#f7f4ef;">
          <span style="font-size:14px; line-height:1;">{{ soundIcon }}</span>
          <span style="{{ soundLabelStyle }}">{{ soundLabel }}</span>
        </button>
        <button style="{{ reserveBtnStyle }}" style-hover="background:#0a0a0a; color:#f7f4ef; box-shadow:inset 0 0 0 1px #f7f4ef;">
          {{ reserveText }} <span style="font-family:'Playfair Display',serif; font-style:italic; font-weight:600; text-transform:none; font-size:18px; letter-spacing:0.02em;">{{ reserveWord }}</span>
        </button>
      </div>
    </div>
  </section>

  <!-- MENU: blurred backdrop + white side panel -->
  <div style="{{ overlayStyle }}" onClick="{{ closeMenu }}"></div>
  <div style="{{ panelStyle }}">
    <div style="display:flex; justify-content:flex-end;">
      <button onClick="{{ closeMenu }}" style="display:flex; align-items:center; gap:12px; background:none; border:none; cursor:pointer; font-family:'Archivo',sans-serif; font-size:12px; letter-spacing:0.28em; font-weight:600; color:#4a463f; text-transform:uppercase; padding:0;">
        <span>{{ closeLabel }}</span>
        <span style="display:flex; align-items:center; justify-content:center; width:30px; height:30px; border:1px solid rgba(20,17,13,0.25); font-size:16px; line-height:1; color:#14110d;">×</span>
      </button>
    </div>

    <nav style="{{ navListStyle }}">
      <sc-for list="{{ navItems }}" as="item" hint-placeholder-count="6">
        <a href="#" onClick="{{ closeMenu }}" style="{{ item.animStyle }}">
          <span style="font-family:'Playfair Display',serif; font-size:clamp(28px, 3.6vw, 46px); font-weight:700; color:#14110d; text-transform:uppercase; letter-spacing:-0.01em; line-height:1.02;">{{ item.roman }}</span>
          <span style="font-family:'Playfair Display',serif; font-size:clamp(28px, 3.6vw, 46px); font-style:italic; font-weight:500; color:#b0a99e; line-height:1.02;">{{ item.italic }}</span>
        </a>
      </sc-for>
    </nav>

    <div style="display:flex; align-items:baseline; justify-content:space-between; gap:16px; flex-wrap:wrap;">
      <span style="color:#8c877d; font-size:11px; letter-spacing:0.3em; font-weight:600; text-transform:uppercase;">{{ followLabel }}</span>
      <div style="display:flex; gap:24px; flex-wrap:wrap;">
        <a href="#" style="color:#14110d; font-size:11px; letter-spacing:0.22em; font-weight:600; text-transform:uppercase; text-decoration:none; transition:opacity 0.3s ease;" style-hover="opacity:0.5;">Instagram</a>
        <a href="#" style="color:#14110d; font-size:11px; letter-spacing:0.22em; font-weight:600; text-transform:uppercase; text-decoration:none; transition:opacity 0.3s ease;" style-hover="opacity:0.5;">Facebook</a>
        <a href="#" style="color:#14110d; font-size:11px; letter-spacing:0.22em; font-weight:600; text-transform:uppercase; text-decoration:none; transition:opacity 0.3s ease;" style-hover="opacity:0.5;">Twitter</a>
      </div>
    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.videoRef = React.createRef();
    this.audioRef = React.createRef();
    this._fadeTimer = null;
    this.state = {
      menuOpen: false,
      soundOn: false,
      isMobile: (typeof window !== 'undefined' && window.innerWidth <= 760),
      lang: this.detectLang()
    };
    this.handleResize = this.handleResize.bind(this);
  }

  // Idioma por defecto: inglés. Prioridad: preferencia guardada > idioma/región del navegador.
  detectLang() {
    try {
      const saved = localStorage.getItem('krp_lang');
      if (saved === 'en' || saved === 'es') return saved;
    } catch (e) {}
    try {
      const spanish = (typeof window !== 'undefined' && window.SPANISH_COUNTRIES) || [];
      const list = (navigator.languages && navigator.languages.length)
        ? navigator.languages
        : [navigator.language || navigator.userLanguage || 'en'];
      for (let i = 0; i < list.length; i++) {
        const tag = (list[i] || '').toLowerCase();
        if (!tag) continue;
        if (tag === 'es' || tag.indexOf('es-') === 0) return 'es';
        const region = tag.split('-')[1];
        if (region && spanish.indexOf(region.toUpperCase()) !== -1) return 'es';
      }
    } catch (e) {}
    return 'en';
  }

  setLang = (lang) => {
    if (lang !== 'en' && lang !== 'es') return;
    try { localStorage.setItem('krp_lang', lang); } catch (e) {}
    this.setState({ lang });
  };
  setEN = () => this.setLang('en');
  setES = () => this.setLang('es');

  tryPlayVideo = () => {
    const v = this.videoRef.current;
    if (!v) return;
    v.muted = true;
    v.defaultMuted = true;
    v.setAttribute('muted', '');
    v.setAttribute('playsinline', '');
    const p = v.play();
    if (p && p.catch) p.catch(() => {});
  };

  componentDidMount() {
    this.tryPlayVideo();
    // Some mobile browsers (Edge/iOS) block muted autoplay until first interaction.
    this._kick = () => { this.tryPlayVideo(); };
    ['touchstart', 'pointerdown', 'click', 'scroll'].forEach(function (ev) {
      window.addEventListener(ev, this._kick, { once: true, passive: true });
    }, this);
    const v = this.videoRef.current;
    if (v) v.addEventListener('canplay', this._kick);
    window.addEventListener('resize', this.handleResize);
  }
  componentWillUnmount() {
    window.removeEventListener('resize', this.handleResize);
    clearInterval(this._fadeTimer);
  }
  handleResize() {
    const m = window.innerWidth <= 760;
    if (m !== this.state.isMobile) this.setState({ isMobile: m });
  }

  openMenu = () => this.setState({ menuOpen: true });
  closeMenu = () => this.setState({ menuOpen: false });
  fadeAudio = (to) => {
    const a = this.audioRef.current;
    if (!a) return;
    clearInterval(this._fadeTimer);
    const step = (to - a.volume) / 16;
    this._fadeTimer = setInterval(() => {
      let nv = a.volume + step;
      if ((step > 0 && nv >= to) || (step < 0 && nv <= to)) { nv = to; clearInterval(this._fadeTimer); }
      a.volume = Math.max(0, Math.min(1, nv));
      if (to === 0 && a.volume === 0) a.pause();
    }, 45);
  };

  toggleSound = () => {
    const a = this.audioRef.current;
    const next = !this.state.soundOn;
    if (a) {
      if (next) {
        a.volume = 0;
        const p = a.play();
        if (p && p.catch) p.catch(() => {});
        this.fadeAudio(0.85);
      } else {
        this.fadeAudio(0);
      }
    }
    this.setState({ soundOn: next });
  };

  renderVals() {
    const m = this.state.isMobile;
    const open = this.state.menuOpen;
    const lang = (this.state.lang === 'es') ? 'es' : 'en';
    const dict = (typeof window !== 'undefined' && window.translations) ? window.translations : {};
    const t = dict[lang] || dict.en || {};
    const hero = t.hero || [];

    const data = t.nav || [];
    const navItems = data.map((d, i) => {
      const delay = open ? (0.2 + i * 0.06) : 0;
      const animStyle = [
        "display:flex",
        "flex-wrap:wrap",
        "align-items:baseline",
        "column-gap:0.25em",
        "text-decoration:none",
        "opacity:" + (open ? 1 : 0),
        "transform:translateX(" + (open ? "0" : "22px") + ")",
        "transition:opacity 0.6s ease " + delay + "s, transform 0.6s cubic-bezier(0.16,1,0.3,1) " + delay + "s"
      ].join(";");
      return { roman: d.roman, italic: d.italic, animStyle };
    });

    return {
      videoRef: this.videoRef,
      audioRef: this.audioRef,
      openMenu: this.openMenu,
      closeMenu: this.closeMenu,
      toggleSound: this.toggleSound,
      setEN: this.setEN,
      setES: this.setES,
      soundIcon: this.state.soundOn ? '♪' : '⊘',
      soundLabel: this.state.soundOn ? (t.soundOn || 'Sound') : (t.soundOff || 'Mute'),
      menuLabel: t.menu || 'Menu',
      heroLine1: hero[0] || '',
      heroLine2: hero[1] || '',
      heroLine3: hero[2] || '',
      heroLine4: hero[3] || '',
      introText: t.intro || '',
      reserveText: t.reserveText || '',
      reserveWord: t.reserveWord || '',
      closeLabel: t.close || 'Close',
      followLabel: t.follow || '',
      navItems,

      headerRightStyle: "display:flex; align-items:center; gap:" + (m ? "13px" : "30px") + ";",
      langSwitchStyle: "display:flex; align-items:center; gap:" + (m ? "7px" : "9px") + ";",
      enBtnStyle: "background:none; border:none; cursor:pointer; padding:0; font-family:'Archivo',sans-serif; font-size:" + (m ? "10px" : "12px") + "; letter-spacing:" + (m ? "0.16em" : "0.24em") + "; font-weight:600; text-transform:uppercase; transition:color 0.3s ease; color:" + (lang === 'en' ? '#f4f1ec' : 'rgba(244,241,236,0.45)') + ";",
      esBtnStyle: "background:none; border:none; cursor:pointer; padding:0; font-family:'Archivo',sans-serif; font-size:" + (m ? "10px" : "12px") + "; letter-spacing:" + (m ? "0.16em" : "0.24em") + "; font-weight:600; text-transform:uppercase; transition:color 0.3s ease; color:" + (lang === 'es' ? '#f4f1ec' : 'rgba(244,241,236,0.45)') + ";",

      headerStyle: "position:fixed; top:0; left:0; right:0; z-index:30; display:flex; justify-content:space-between; align-items:center; padding:" + (m ? "20px 20px" : "34px 48px") + "; animation:fadeIn 1s ease both 0.1s;",
      brandStyle: "font-size:" + (m ? "11px" : "13px") + "; letter-spacing:0.3em; font-weight:600; color:#f4f1ec; text-transform:uppercase; text-decoration:none; max-width:60%;",
      menuBtnStyle: "display:flex; align-items:center; gap:" + (m ? "8px" : "12px") + "; background:none; border:none; cursor:pointer; font-family:'Archivo',sans-serif; font-size:" + (m ? "11px" : "13px") + "; letter-spacing:0.3em; font-weight:600; color:#f4f1ec; text-transform:uppercase; padding:0;",

      sectionStyle: "position:relative; z-index:10; min-height:100vh; min-height:100dvh; box-sizing:border-box; display:flex; flex-direction:column; padding:" + (m ? "68px 20px 30px" : "120px 48px 44px") + ";",

      bottomRowStyle: "margin-top:auto; display:flex; " + (m
        ? "flex-direction:column; align-items:stretch; gap:20px;"
        : "justify-content:space-between; align-items:flex-end; gap:48px; flex-wrap:wrap;"),

      paraStyle: "margin:0; max-width:520px; color:#ded9cf; font-size:" + (m ? "10.5px" : "13px") + "; line-height:" + (m ? "1.65" : "2.1") + "; letter-spacing:" + (m ? "0.16em" : "0.22em") + "; text-transform:uppercase; animation:softUp 1s ease both 0.85s;",

      actionGroupStyle: "display:flex; gap:12px; " + (m
        ? "width:100%; align-items:stretch;"
        : "align-items:center; flex:none; margin-left:auto;") + " animation:softUp 1s ease both 0.95s;",

      reserveBtnStyle: "" + (m ? "flex:1 1 auto; min-width:0; " : "flex:none; ") + "background:#f7f4ef; border:none; cursor:pointer; padding:" + (m ? "17px 20px" : "30px 56px") + "; color:#0a0a0a; font-family:'Archivo',sans-serif; font-size:" + (m ? "12px" : "14px") + "; letter-spacing:0.22em; font-weight:600; text-transform:uppercase; white-space:nowrap; transition:background 0.4s ease, color 0.4s ease, box-shadow 0.4s ease;",

      heroOverlayStyle: "position:relative; z-index:1; min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; background:" + (m
        ? "linear-gradient(180deg, rgba(8,8,8,0.6) 0%, rgba(8,8,8,0.28) 26%, rgba(8,8,8,0.32) 52%, rgba(8,8,8,0.66) 100%)"
        : "linear-gradient(180deg, rgba(8,8,8,0.72) 0%, rgba(8,8,8,0.55) 38%, rgba(8,8,8,0.78) 100%)") + ";",

      soundBtnStyle: "flex:none; display:flex; align-items:center; justify-content:center; gap:10px; box-sizing:border-box; " + (m ? "width:54px; padding:0;" : "padding:0 22px; height:64px;") + " background:rgba(8,8,8,0.4); border:1px solid rgba(247,244,239,0.4); border-radius:40px; cursor:pointer; font-family:'Archivo',sans-serif; font-size:11px; letter-spacing:0.24em; font-weight:600; color:#e8e3d8; text-transform:uppercase; transition:border-color 0.3s ease, color 0.3s ease;",

      soundLabelStyle: m ? "display:none;" : "display:inline;",

      overlayStyle: "position:fixed; inset:0; z-index:50; background:rgba(6,6,6,0.42); -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); transition:opacity 0.5s ease, visibility 0.5s ease; opacity:" + (open ? 1 : 0) + "; visibility:" + (open ? "visible" : "hidden") + ";",

      panelStyle: "position:fixed; top:0; right:0; z-index:51; height:100%; box-sizing:border-box; width:" + (m ? "100%" : "min(600px, 46vw)") + "; background:#f6f3ee; box-shadow:-30px 0 80px rgba(0,0,0,0.35); transform:translateX(" + (open ? "0" : "101%") + "); transition:transform 0.6s cubic-bezier(0.16,1,0.3,1); display:flex; flex-direction:column; padding:" + (m ? "24px 24px 32px" : "34px 44px 44px") + ";",

      navListStyle: "margin:auto 0; display:flex; flex-direction:column; gap:" + (m ? "6px" : "10px") + ";"
    };
  }
}
</script>
</body>
</html>
